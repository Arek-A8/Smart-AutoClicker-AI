# Builds the Klickr AI debug APK (fDroid flavour, .ai package) on GitHub's x86_64 runners.
#
# The Android SDK aapt2/d8/r8 and the NDK (needed for the native NCNN detector) ship as x86_64-only
# host binaries, so this cannot be built on an arm64 device — CI is the supported path. The produced
# APK co-installs alongside the original Klick'r for side-by-side comparison.
name: Build Klickr AI (fDroid debug)

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install CMake and accept licenses (NDK auto-fetched by AGP)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build fDroid debug APK
        run: ./gradlew :smartautoclicker:assembleFDroidDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: klickr-ai-fdroid-debug
          path: |
            smartautoclicker/build/outputs/apk/fDroid/debug/*.apk
          if-no-files-found: error
